name: Release-plz

on:
  push:
    branches:
      - main
  schedule:
    # Run every Friday at 17:00 UTC to automatically merge the open Release PR
    # Note: A separate step/action would be needed to automatically merge it, 
    # but release-plz itself runs on this schedule to ensure PR is up-to-date.
    - cron: '0 17 * * 5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
